<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬遠榮副校長 研究成果預覽窗</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 20px; font-family: '微軟正黑體', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* 🎨 YRM 幾何占位圖 */
        .ma-placeholder {
            width: 100%; height: 100%; background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            display: flex; align-items: center; justify-content: center;
            color: #0369a1; font-family: 'Arial Black', sans-serif; font-size: 2.5rem; font-weight: 800; opacity: 0.5;
        }
        .ma-papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .ma-paper-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .ma-paper-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .ma-star-badge { position: absolute; top: 10px; right: 10px; background: #f1c40f; color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; z-index: 10; }
        .ma-cover-wrapper { height: 180px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #f1f5f9; }
        .ma-cover-img { width: 100%; height: 100%; object-fit: cover; }
        .ma-paper-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .ma-paper-title { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .ma-highlight { font-size: 0.75rem; background: #ecfdf5; color: #059669; padding: 5px 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #d1fae5; }
        .ma-journal-name { color: #16a085; font-weight: 600; font-size: 0.85rem; }
        .ma-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .ma-badge { background: #eff6ff; color: #2563eb; padding: 3px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .ma-doi-btn { background: #16a085; color: white !important; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; }
        .ma-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #maSearchInput { padding: 8px 12px; width: 280px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .ma-btn { cursor: pointer; background: #2c3e50; color: white; border: none; padding: 8px 16px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ma-controls">
            <input id="maSearchInput" onkeyup="maFilter()" placeholder="🔍 搜尋論文標題、期刊或年份..." type="text">
            <div style="display: flex; align-items: center;">
                <span id="maCount" style="margin-right: 15px; font-weight: bold; color: #64748b;">載入中...</span>
                <button onclick="maToggle()" id="maToggleBtn" class="ma-btn">展開完整著作目錄</button>
            </div>
        </div>
        <div class="ma-papers-grid" id="ma-container"></div>
    </div>

    <script>
        let maFullList = [];
        let maIsShowAll = false;
        const maCutoff = new Date().getFullYear() - 4;

        fetch('papers.json')
            .then(res => res.json())
            .then(data => {
                maFullList = data.sort((a, b) => {
                    if (a.is_star !== b.is_star) return a.is_star === "是" ? -1 : 1;
                    return (parseInt(b.year)||0) - (parseInt(a.year)||0);
                });
                maFilter();
            });

        function maToggle() {
            maIsShowAll = !maIsShowAll;
            document.getElementById('maToggleBtn').innerText = maIsShowAll ? "僅顯示近五年發表" : "展開完整著作目錄";
            maFilter();
        }

        function maFilter() {
            const key = document.getElementById('maSearchInput').value.toLowerCase();
            let f = maFullList;
            if (!maIsShowAll) f = f.filter(p => (parseInt(p.year)||0) >= maCutoff);
            if (key) f = f.filter(p => p.title.toLowerCase().includes(key) || p.journal.toLowerCase().includes(key) || p.year.includes(key));
            
            document.getElementById('maCount').innerText = `共 ${f.length} 篇`;
            document.getElementById('ma-container').innerHTML = f.map(p => `
                <div class="ma-paper-card">
                    ${p.is_star === "是" ? '<div class="ma-star-badge">⭐ 通訊作者</div>' : ''}
                    <div class="ma-cover-wrapper">
                        ${p.cover_url ? `<img src="${p.cover_url}" class="ma-cover-img" onerror="this.parentElement.innerHTML='<div class=ma-placeholder>YRM</div>'">` : '<div class="ma-placeholder">YRM</div>'}
                    </div>
                    <div class="ma-paper-info">
                        <h3 class="ma-paper-title">${p.title}</h3>
                        ${p.highlight ? `<div class="ma-highlight">${p.highlight}</div>` : ''}
                        <div class="ma-journal-name">${p.journal}</div>
                        <div style="font-size:0.8rem; color:#64748b;">Published: ${p.year}</div>
                        <div class="ma-footer">
                            <span class="ma-badge">📊 ${p.citations} Citations</span>
                            <a href="${p.doi}" target="_blank" class="ma-doi-btn">View DOI</a>
                        </div>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
